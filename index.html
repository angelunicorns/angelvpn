<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Angel VPN | Личный кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Базовые переменные (ангельская тема) */
        :root {
            --bg-primary: #f5f7ff;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #6c4eff;
            --accent-dark: #5a3ce8;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 20px 35px rgba(0, 0, 0, 0.05);
            --status-bg: rgba(0, 0, 0, 0.03);
            --feature-bg: rgba(0, 0, 0, 0.02);
            --input-bg: #ffffff;
            --gradient-start: #6c4eff;
            --gradient-end: #5a3ce8;
        }

        /* Тема: Закат */
        body[data-theme="sunset"] {
            --bg-primary: #1a0b2e;
            --bg-secondary: #2d1b3a;
            --bg-card: rgba(45, 27, 58, 0.92);
            --text-primary: #ffeedd;
            --text-secondary: #ffccaa;
            --accent: #ff6b6b;
            --accent-dark: #ff8e53;
            --border: rgba(255, 200, 150, 0.2);
            --gradient-start: #ff6b6b;
            --gradient-end: #ff8e53;
        }

        /* Тема: Космос */
        body[data-theme="space"] {
            --bg-primary: #0a0f2a;
            --bg-secondary: #0e1a2a;
            --bg-card: rgba(10, 20, 40, 0.92);
            --text-primary: #b0e0ff;
            --text-secondary: #88aaff;
            --accent: #4facfe;
            --accent-dark: #00f2fe;
            --border: rgba(79, 172, 254, 0.2);
            --gradient-start: #4facfe;
            --gradient-end: #00f2fe;
        }

        /* Тема: Неон */
        body[data-theme="neon"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20, 20, 30, 0.92);
            --text-primary: #0fff0f;
            --text-secondary: #88ff88;
            --accent: #00ff9d;
            --accent-dark: #00ffcc;
            --border: rgba(0, 255, 157, 0.3);
            --gradient-start: #00ff9d;
            --gradient-end: #00ffcc;
        }

        /* Темная тема (отдельно) */
        body[data-theme="dark"] {
            --bg-primary: #0a0c15;
            --bg-secondary: #141824;
            --bg-card: rgba(15, 20, 35, 0.92);
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --accent: #8a6eff;
            --accent-dark: #6c4eff;
            --border: rgba(255, 255, 255, 0.1);
            --gradient-start: #8a6eff;
            --gradient-end: #6c4eff;
            --status-bg: rgba(255, 255, 255, 0.05);
            --feature-bg: rgba(255, 255, 255, 0.05);
            --input-bg: #1e2438;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Частицы */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--accent), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 22px;
            color: white;
        }

        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .theme-toggle, .profile-btn, .gradient-select, .lang-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .profile-btn {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
        }

        .gradient-select, .lang-select {
            background: var(--feature-bg);
        }

        .theme-toggle:active, .profile-btn:active, .gradient-select:active, .lang-select:active {
            transform: scale(0.96);
        }

        /* Карточки */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Круглая кнопка СТАРТ */
        .start-wrapper {
            display: flex;
            justify-content: center;
            margin: 16px 0;
            position: relative;
        }

        .circle-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gradient-start), var(--gradient-end));
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 15px 30px -8px rgba(108, 78, 255, 0.4);
            transition: all 0.15s;
            position: relative;
            z-index: 2;
        }

        .circle-btn:active {
            transform: scale(0.94);
        }

        .circle-btn i {
            font-size: 38px;
            color: white;
        }

        .circle-btn span {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
        }

        /* Пульсирующее кольцо */
        .pulse-ring {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(108, 78, 255, 0.3);
            animation: pulse 1.8s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        /* Статус */
        .status-panel {
            background: var(--status-bg);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5e5e;
            box-shadow: 0 0 6px #ff5e5e;
            transition: all 0.2s;
        }

        .status-dot.active {
            background: #3eff9e;
            box-shadow: 0 0 10px #3eff9e;
        }

        /* Сетка функций */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .feature-item {
            background: var(--feature-bg);
            border-radius: 14px;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.7rem;
        }

        .feature-item i {
            font-size: 1rem;
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
        }

        @media (max-width: 450px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Личный кабинет */
        .profile-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .profile-details {
            flex: 1;
        }

        .username-display {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .edit-name-btn {
            background: var(--feature-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .user-id {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .user-id:hover {
            opacity: 1;
        }

        /* Toast уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 24px;
            max-width: 320px;
            width: 85%;
            border: 1px solid var(--border);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            margin: 16px 0;
            font-size: 1rem;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .error-msg {
            color: #ff5e5e;
            font-size: 0.75rem;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .gradient-option, .lang-option {
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }

        .gradient-option:active, .lang-option:active {
            transform: scale(0.97);
        }

        /* Футер с цитатами */
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            opacity: 0.6;
            padding-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .footer:hover {
            opacity: 0.9;
        }

        .footer i {
            margin-right: 4px;
        }

        /* Оверлей загрузки */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(108, 78, 255, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

            idCopied: "?? ID copied:",
            themeChanged: "?? Theme:",
            lightTheme: "?? Light theme",
            darkTheme: "?? Dark theme",
            connecting: "Connecting to Angel VPN...",
            bypassing: "Bypassing white lists...",
            redirecting: "Redirecting to Telegram...",
            quotes: [
                "Angel VPN — your protection anywhere",
                "Bypass blocks with Angel VPN",
                "Fast and secure internet",
                "Your privacy is our priority",
                "Angel VPN — access without borders",
                "Stay connected with Angel VPN",
                "Security first",
                "Bypass any restrictions"
            ]
        }
    };
    
    let currentLang = localStorage.getItem('app_lang') || 'ru';
    
    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('langBtnText').textContent = t.langBtn;
        document.getElementById('styleBtnText').textContent = t.styleBtn;
        document.getElementById('statusText').textContent = t.statusReady;
        document.getElementById('startBtnText').textContent = t.startBtn;
        document.getElementById('feature1').textContent = t.feature1;
        document.getElementById('feature2').textContent = t.feature2;
        document.getElementById('feature3').textContent = t.feature3;
        document.getElementById('feature4').textContent = t.feature4;
        document.getElementById('cabinetTitle').textContent = t.cabinetTitle;
        document.getElementById('editBtnText').textContent = t.editBtn;
        document.getElementById('styleModalTitle').innerHTML = `<i class="fas fa-palette"></i> ${t.styleModalTitle}`;
        document.getElementById('langModalTitle').innerHTML = `<i class="fas fa-language"></i> ${t.langModalTitle}`;
        document.getElementById('nameModalTitle').textContent = t.nameModalTitle;
        document.getElementById('newUsername').placeholder = t.namePlaceholder;
        document.getElementById('saveNameBtn').textContent = t.saveBtn;
        
        // Обновляем цитату
        const quoteIndex = Math.floor(Math.random() * t.quotes.length);
        document.getElementById('quoteText').textContent = t.quotes[quoteIndex];
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('app_lang', lang);
        updateLanguage();
        showToast(`${lang === 'ru' ? '???? Русский язык' : '???? English language'}`);
    }
    
    // ==================== ЦИТАТЫ (№3) ====================
    function updateQuote() {
        const t = translations[currentLang];
        const quoteIndex = Math.floor(Math.random() * t.quotes.length);
        document.getElementById('quoteText').textContent = t.quotes[quoteIndex];
    }
    
    // Меняем цитату по клику на футер
    document.getElementById('quoteFooter').addEventListener('click', () => {
        updateQuote();
        showToast(translations[currentLang].quotes[Math.floor(Math.random() * translations[currentLang].quotes.length)]);
    });
    
    // Меняем цитату каждые 30 секунд
    setInterval(updateQuote, 30000);
    
    // ==================== ЧАСТИЦЫ ====================
    function createParticles() {
        const container = document.getElementById('particlesContainer');
        if (!container) return;
        container.innerHTML = '';
        const particleCount = window.innerWidth < 768 ? 25 : 40;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 5 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            container.appendChild(particle);
        }
    }
    
    function updateParticlesColor() {
        const particles = document.querySelectorAll('.particle');
        const accentColor = getComputedStyle(document.body).getPropertyValue('--accent').trim();
        particles.forEach(p => {
            p.style.background = `radial-gradient(circle, ${accentColor}, transparent)`;
        });
    }
    
    // ==================== TOAST ====================
    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }
    
    // ==================== ПОЛЬЗОВАТЕЛЬ ====================
    let existingNames = JSON.parse(localStorage.getItem('angel_usernames')) || [];
    let currentUser = JSON.parse(localStorage.getItem('angel_current_user')) || {
        id: Math.floor(Math.random() * 90000) + 10000,
        username: 'AngelUser'
    };
    
    function saveCurrentUser() {
        localStorage.setItem('angel_current_user', JSON.stringify(currentUser));
        if (!existingNames.includes(currentUser.username)) {
            existingNames.push(currentUser.username);
            localStorage.setItem('angel_usernames', JSON.stringify(existingNames));
        }
    }
    
    function isUsernameUnique(name, excludeCurrent = true) {
        const currentName = excludeCurrent ? currentUser.username : null;
        return !existingNames.some(existing => 
            existing.toLowerCase() === name.toLowerCase() && 
            (excludeCurrent ? existing !== currentName : true)
        );
    }
    
    if (!existingNames.includes(currentUser.username)) {
        existingNames.push(currentUser.username);
        localStorage.setItem('angel_usernames', JSON.stringify(existingNames));
    }
    
    // ==================== ТЕМЫ ====================
    let currentTheme = localStorage.getItem('app_theme') || 'default';
    
    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('app_theme', theme);
        currentTheme = theme;
        updateParticlesColor();
        
        const themeToggle = document.getElementById('themeToggle');
        if (theme === 'dark') {
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }
    
    function toggleLightDark() {
        if (currentTheme === 'dark') {
            setTheme('default');
            showToast(translations[currentLang].lightTheme);
        } else {
            setTheme('dark');
            showToast(translations[currentLang].darkTheme);
        }
    }
    
    setTheme(currentTheme);
    
    // ==================== ЭЛЕМЕНТЫ ====================
    const themeToggle = document.getElementById('themeToggle');
    const gradientSelect = document.getElementById('gradientSelect');
    const gradientModal = document.getElementById('gradientModal');
    const closeGradientModal = document.getElementById('closeGradientModal');
    const langSelect = document.getElementById('langSelect');
    const langModal = document.getElementById('langModal');
    const closeLangModal = document.getElementById('closeLangModal');
    const profileBtn = document.getElementById('profileBtn');
    const startBtn = document.getElementById('startBtn');
    const editNameBtn = document.getElementById('editNameBtn');
    const nameModal = document.getElementById('nameModal');
    const closeNameModal = document.getElementById('closeNameModal');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const newUsernameInput = document.getElementById('newUsername');
    const nameError = document.getElementById('nameError');
    const loaderOverlay = document.getElementById('loaderOverlay');
    const loaderText = document.getElementById('loaderText');
    const copyIdBtn = document.getElementById('copyIdBtn');
    
    const usernameDisplay = document.getElementById('usernameDisplay');
    const avatarLetter = document.getElementById('avatarLetter');
    const userIdSpan = document.getElementById('userId');
    const statusDot = document.getElementById('statusDot');
    const latencyValueSpan = document.getElementById('latencyValue');
    
    function updateCabinet() {
        usernameDisplay.textContent = currentUser.username;
        avatarLetter.textContent = currentUser.username.charAt(0).toUpperCase();
        userIdSpan.textContent = currentUser.id;
    }
    
    // ==================== СМЕНА ИМЕНИ ====================
    function openNameModal() {
        newUsernameInput.value = currentUser.username;
        nameError.textContent = '';
        nameModal.classList.add('active');
    }
    
    function closeNameModalFunc() {
        nameModal.classList.remove('active');
    }
    
    function saveNewUsername() {
        const t = translations[currentLang];
        const newName = newUsernameInput.value.trim();
        if (!newName) {
            nameError.textContent = t.nameEmpty;
            return;
        }
        if (newName.length < 2) {
            nameError.textContent = t.nameShort;
            return;
        }
        if (newName.length > 20) {
            nameError.textContent = t.nameLong;
            return;
        }
        
        if (!isUsernameUnique(newName, true)) {
            nameError.textContent = t.nameTaken;
            return;
        }
        
        const oldNameIndex = existingNames.indexOf(currentUser.username);
        if (oldNameIndex !== -1) existingNames.splice(oldNameIndex, 1);
        
        currentUser.username = newName;
        existingNames.push(newName);
        
        localStorage.setItem('angel_usernames', JSON.stringify(existingNames));
        saveCurrentUser();
        updateCabinet();
        closeNameModalFunc();
        showToast(`${t.nameChanged} "${newName}"`);
    }
    
    // ==================== КОПИРОВАНИЕ ID ====================
    function copyUserId() {
        const userId = currentUser.id;
        navigator.clipboard.writeText(userId.toString()).then(() => {
            showToast(`${translations[currentLang].idCopied} ${userId}`);
        }).catch(() => {
            showToast('? Failed to copy');
        });
    }
    
    // ==================== ПЕРЕХОД В TELEGRAM ====================
    function redirectToTelegram() {
        const t = translations[currentLang];
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
        
        loaderOverlay.classList.add('active');
        loaderText.textContent = t.connecting;
        
        setTimeout(() => {
            loaderText.textContent = t.bypassing;
        }, 300);
        
        setTimeout(() => {
            loaderText.textContent = t.redirecting;
        }, 700);
        
        setTimeout(() => {
            window.location.href = 'https://t.me/angelvpns';
        }, 1200);
    }
    
    // ==================== МОДАЛКИ ====================
    function openGradientModal() {
        gradientModal.classList.add('active');
    }
    
    function closeGradientModalFunc() {
        gradientModal.classList.remove('active');
    }
    
    function openLangModal() {
        langModal.classList.add('active');
    }
    
    function closeLangModalFunc() {
        langModal.classList.remove('active');
    }
    
    // ==================== ПИНГ ====================
    function updateLatency() {
        latencyValueSpan.textContent = Math.floor(Math.random() * 40) + 18;
    }
    setInterval(updateLatency, 2000);
    updateLatency();
    
    // ==================== СОБЫТИЯ ====================
    startBtn.addEventListener('click', redirectToTelegram);
    profileBtn.addEventListener('click', openNameModal);
    editNameBtn.addEventListener('click', openNameModal);
    closeNameModal.addEventListener('click', closeNameModalFunc);
    saveNameBtn.addEventListener('click', saveNewUsername);
    gradientSelect.addEventListener('click', openGradientModal);
    closeGradientModal.addEventListener('click', closeGradientModalFunc);
    langSelect.addEventListener('click', openLangModal);
    closeLangModal.addEventListener('click', closeLangModalFunc);
    themeToggle.addEventListener('click', toggleLightDark);
    copyIdBtn.addEventListener('click', copyUserId);
    
    nameModal.addEventListener('click', (e) => {
        if (e.target === nameModal) closeNameModalFunc();
    });
    
    gradientModal.addEventListener('click', (e) => {
        if (e.target === gradientModal) closeGradientModalFunc();
    });
    
    langModal.addEventListener('click', (e) => {
        if (e.target === langModal) closeLangModalFunc();
    });
    
    newUsernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') saveNewUsername();
    });
    
    // Выбор градиента
    document.querySelectorAll('.gradient-option').forEach(btn => {
        btn.addEventListener('click', () => {
            const theme = btn.dataset.theme;
            setTheme(theme);
            closeGradientModalFunc();
            const themeNames = {
                default: 'Ангельский',
                sunset: 'Закат',
                space: 'Космос',
                neon: 'Неон',
                dark: 'Темную'
            };
            showToast(`${translations[currentLang].themeChanged} ${themeNames[theme] || theme}`);
        });
    });
    
    // Выбор языка
    document.querySelectorAll('.lang-option').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.dataset.lang;
            setLanguage(lang);
            closeLangModalFunc();
            updateQuote();
        });
    });
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    updateCabinet();
    createParticles();
    updateParticlesColor();
    updateLanguage();
    updateQuote();
    
    window.addEventListener('resize', () => {
        createParticles();
        updateParticlesColor();
    });
    
    setInterval(() => {
        if (statusDot.classList.contains('active')) {
            statusDot.style.transform = 'scale(1.1)';
            setTimeout(() => {
                statusDot.style.transform = 'scale(1)';
            }, 200);
        }
    }, 2000);
</script>
</body>
</html>
